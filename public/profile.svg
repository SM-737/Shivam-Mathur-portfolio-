<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="avatarGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </radialGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <linearGradient id="hexBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="200,30 360,115 360,285 200,370 40,285 40,115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Outer glow hex -->
  <polygon points="200,20 375,112 375,295 200,387 25,295 25,112"
    fill="none" stroke="url(#glowGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Main hex frame -->
  <polygon points="200,30 360,115 360,285 200,370 40,285 40,115"
    fill="url(#avatarGrad)" stroke="url(#hexBorder)" stroke-width="2"/>

  <!-- Circuit pattern lines -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="0.8" fill="none">
    <line x1="40" y1="200" x2="120" y2="200"/>
    <line x1="280" y1="200" x2="360" y2="200"/>
    <line x1="120" y1="200" x2="120" y2="160"/>
    <line x1="280" y1="200" x2="280" y2="160"/>
    <circle cx="120" cy="200" r="4" fill="#00d4ff"/>
    <circle cx="280" cy="200" r="4" fill="#00d4ff"/>
    <line x1="120" y1="160" x2="160" y2="160"/>
    <line x1="280" y1="160" x2="240" y2="160"/>
    <circle cx="160" cy="160" r="3" fill="#4facfe"/>
    <circle cx="240" cy="160" r="3" fill="#4facfe"/>
  </g>

  <!-- Person silhouette - head -->
  <circle cx="200" cy="155" r="52" fill="#1e3a6e" opacity="0.9"/>
  <circle cx="200" cy="155" r="50" fill="#162d57"/>

  <!-- Face highlight -->
  <ellipse cx="195" cy="145" rx="25" ry="28" fill="#1e3f70" opacity="0.7"/>

  <!-- Person silhouette - body/shoulders -->
  <ellipse cx="200" cy="290" rx="90" ry="70" fill="#162d57" opacity="0.95"/>
  <ellipse cx="200" cy="285" rx="85" ry="65" fill="#1a3464"/>

  <!-- Collar / suit detail -->
  <path d="M165,255 L200,275 L235,255 L240,270 L200,295 L160,270 Z" fill="#0d1f3c" opacity="0.8"/>
  <path d="M190,265 L200,275 L210,265 L210,290 L200,295 L190,290 Z" fill="#00d4ff" opacity="0.2"/>

  <!-- Glow dots on hex corners -->
  <circle cx="200" cy="30" r="4" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="360" cy="115" r="4" fill="#4facfe" filter="url(#glow)" opacity="0.8"/>
  <circle cx="360" cy="285" r="4" fill="#4facfe" filter="url(#glow)" opacity="0.8"/>
  <circle cx="200" cy="370" r="4" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="40" cy="285" r="4" fill="#4facfe" filter="url(#glow)" opacity="0.8"/>
  <circle cx="40" cy="115" r="4" fill="#4facfe" filter="url(#glow)" opacity="0.8"/>

  <!-- Scanning line -->
  <rect x="40" y="185" width="320" height="1" fill="url(#glowGrad)" opacity="0.4"/>

  <!-- Corner accents -->
  <g opacity="0.6" stroke="#00d4ff" stroke-width="1.5" fill="none">
    <!-- Top-left corner -->
    <line x1="15" y1="25" x2="45" y2="25"/>
    <line x1="15" y1="25" x2="15" y2="55"/>
    <!-- Top-right corner -->
    <line x1="385" y1="25" x2="355" y2="25"/>
    <line x1="385" y1="25" x2="385" y2="55"/>
    <!-- Bottom-left corner -->
    <line x1="15" y1="375" x2="45" y2="375"/>
    <line x1="15" y1="375" x2="15" y2="345"/>
    <!-- Bottom-right corner -->
    <line x1="385" y1="375" x2="355" y2="375"/>
    <line x1="385" y1="375" x2="385" y2="345"/>
  </g>

  <!-- Status indicator -->
  <circle cx="330" cy="70" r="8" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="330" cy="70" r="5" fill="#00ff88"/>

  <!-- Text labels -->
  <text x="200" y="393" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="9" opacity="0.7">SHIVAM MATHUR // LATTICE DEV</text>
</svg>
